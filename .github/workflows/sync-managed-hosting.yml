name: Sync Managed Hosting Databases

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */4 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Initialize local mirror databases
        run: python3 mirror-db/initdb.py

      - name: Build current season mirror
        env:
          SPORTWINNER_API_URL: ${{ secrets.SPORTWINNER_API_URL }}
          SPORTWINNER_REFERER: ${{ secrets.SPORTWINNER_REFERER }}
        run: python3 mirror-db/build_db.py --source sportwinner --verbose

      - name: Apply training schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/db/apply-postgres-schema.mjs --source training

      - name: Apply mirror schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MIRROR_DATABASE_URL: ${{ secrets.MIRROR_DATABASE_URL }}
        run: node scripts/db/apply-postgres-schema.mjs --source mirror

      - name: Import training database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRAINING_JSON_PATH: data/training_db.json
        run: node scripts/db/import-training-json.mjs

      - name: Import Sportwinner mirror
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MIRROR_DATABASE_URL: ${{ secrets.MIRROR_DATABASE_URL }}
        run: node scripts/db/import-mirror-sqlite.mjs
